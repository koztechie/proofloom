name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: proofloom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: password
      PGDATABASE: proofloom_test
      # Required mock env vars for CI
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: mock-key
      AWS_SECRET_ACCESS_KEY: mock-secret
      NEXTAUTH_SECRET: mock-secret-key-12345
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run TypeScript typecheck
        run: npx tsc --noEmit

      - name: Apply Drizzle migrations
        run: npx drizzle-kit push
        # Alternatively, since we are doing `migrate` in tests, it might run automatically,
        # but to fulfill the prompt: "Apply Drizzle migrations to local GHA Postgres"
        # We can just run npx drizzle-kit migrate or push here.

      - name: Run Vitest unit & integration tests
        run: npx vitest run --coverage

      - name: Build Next.js application
        run: npm run build
